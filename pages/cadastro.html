<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalStore</title>

  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/cadastro.css">
</head>
<body>
  <form action="./sucesso.html" class="form">
    <h1 id=tituloform> Cadastro</h1>
    <img src="../assets/imagens/logo-localstore.png" alt="Local Store Logo" width="200" height="200" id="logoform">

    <label class="textlabel">Nome/Empresa</label>
    <input class="campotexto" type="text" name="nome" placeholder="Digite seu nome ou da sua empresa">
    <label class="textlabel">Email</label>
    <input class="campotexto" type="email" name="email" placeholder="Digite seu email">

    <label class="textlabel">Senha</label>
    <input class="campotexto" type="password" name="senha" placeholder="Digite sua senha">


    <label class="textlabel">CPF/CNPJ:</label>
    <input class="campotexto" type="text" name="cpf_cnpj" placeholder="Digite seu CPF ou CNPJ">

    <label class="textlabel">Telefone:</label>
    <input class="campotexto" type="tel" name="telefone" placeholder="Digite seu telefone">

    <label class="textlabel">Endereço:</label>
    <input class="campotexto" type="text" name="endereco" placeholder="Digite seu endereço">

    <label class="textlabel">Cidade:</label>
    <input class="campotexto" type="text" name="cidade" placeholder="Digite sua cidade">

    <label class="textlabel">Estado:</label>
    <input class="campotexto" type="text" name="estado" placeholder="Digite seu estado">

    <button id="bnEnviar" type="submit">Enviar</button>
  </form>

</body>
</html>
