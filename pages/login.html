<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>
  <form> 
    <h1 id="tituloform">Login</h1>
    <img src="../assets/imagens/logo-localstore.png" alt="Logo" id="logoform" width="200" height="200">
    
    <label class="textlabel">Email</label>
    <input class="campotexto" type="email" name="email" placeholder="Digite seu email">
   
    <label class="textlabel">Senha</label>
    <input class="campotexto" type="password" name="senha" placeholder="Digite sua senha">

    <button id="bnEnviar" type="submit">
      <p style="text-align:center; margin-top:15px;">
      <a id="entrar-link" href="catalogo.html">Entrar</a>
      </p>
    </button>
  

     <p style="text-align:center; margin-top:15px;">
    Não tem conta? <a href="cadastro.html">Cadastre-se</a>
  </p>

  </form>
  

</body>
</html>
